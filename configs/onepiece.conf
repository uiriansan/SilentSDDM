; One Piece - Modern Minimal SDDM Theme
; Inspired by Luffy, the Thousand Sunny & the Straw Hat Crew
; Straw Hat yellow, ocean blue, Jolly Roger accents

[General]
scale = 1.0
enable-animations = true
animated-background-placeholder = "zoro.png"
background-fill-mode = "fill"

[LockScreen]
display = true
padding-top = 0
padding-right = 0
padding-bottom = 0
padding-left = 0
background = "zoro.mp4"
use-background-color = false
background-color = "#0B1A2E"
blur = 0
brightness = -0.1
saturation = 0.0

[LoginScreen]
background = "zoro.mp4"
use-background-color = false
background-color = "#0B1A2E"
blur = 0
brightness = -0.1
saturation = 0.0

[LoginScreen.LoginArea]
position = "center"
margin = -1

[LoginScreen.LoginArea.Avatar]
shape = "circle"
border-radius = 35
active-size = 120
inactive-size = 80
inactive-opacity = 0.35
active-border-size = 3
inactive-border-size = 0
active-border-color = "#F5C518"
inactive-border-color = "#F5C518"

[LoginScreen.LoginArea.Username]
font-family = "RedHatDisplay"
font-size = 18
font-weight = 700
color = "#FFFFFF"
margin = 12

[LoginScreen.LoginArea.PasswordInput]
width = 220
height = 34
display-icon = false
font-family = "RedHatDisplay"
font-size = 13
icon = "password.svg"
icon-size = 16
content-color = "#FFFFFF"
background-color = "#F5C518"
background-opacity = 0.12
border-size = 1
border-color = "#F5C518"
border-radius-left = 12
border-radius-right = 12
margin-top = 12
masked-character = "●"

[LoginScreen.LoginArea.LoginButton]
background-color = "#F5C518"
background-opacity = 0.90
active-background-color = "#FFD700"
active-background-opacity = 1.0
icon = "arrow-right.svg"
icon-size = 20
content-color = "#0B1A2E"
active-content-color = "#0B1A2E"
border-size = 0
border-color = "#F5C518"
border-radius-left = 12
border-radius-right = 12
margin-left = 6
show-text-if-no-password = true
hide-if-not-needed = false
font-family = "RedHatDisplay"
font-size = 12
font-weight = 700

[LoginScreen.LoginArea.Spinner]
display-text = true
text = "Setting Sail..."
font-family = "RedHatDisplay"
font-weight = 600
font-size = 14
icon-size = 30
icon = "spinner.svg"
color = "#F5C518"
spacing = 8

[LoginScreen.LoginArea.WarningMessage]
font-family = "RedHatDisplay"
font-size = 11
font-weight = 400
normal-color = "#E8D5A3"
warning-color = "#FF6B35"
error-color = "#C41E3A"
margin-top = 12

[LoginScreen.MenuArea.Buttons]
margin-top = 0
margin-right = 0
margin-bottom = 80
margin-left = 0
size = 32
border-radius = 8
spacing = 16
font-family = "RedHatDisplay"

[LoginScreen.MenuArea.Popups]
max-height = 250
item-height = 32
item-spacing = 2
padding = 6
display-scrollbar = false
margin = 6
background-color = "#0F2240"
background-opacity = 0.95
active-option-background-color = "#F5C518"
active-option-background-opacity = 0.20
content-color = "#FFFFFF"
active-content-color = "#F5C518"
font-family = "RedHatDisplay"
border-size = 1
border-color = "#F5C518"
font-size = 12
icon-size = 16

[LoginScreen.MenuArea.Session]
display = true
position = "bottom-center"
index = 0
popup-direction = "up"
popup-align = "center"
display-session-name = false
button-width = -1
popup-width = 200
background-color = "#F5C518"
background-opacity = 0.0
active-background-opacity = 0.25
content-color = "#FFFFFF"
active-content-color = "#F5C518"
border-size = 0
font-size = 10
icon-size = 16

[LoginScreen.MenuArea.Layout]
display = true
position = "bottom-center"
index = 0
popup-direction = "up"
popup-align = "center"
popup-width = 180
display-layout-name = false
background-color = "#F5C518"
background-opacity = 0.0
active-background-opacity = 0.25
content-color = "#FFFFFF"
active-content-color = "#F5C518"
border-size = 0
font-size = 10
icon = "language.svg"
icon-size = 16

[LoginScreen.MenuArea.Keyboard]
display = true
position = "bottom-center"
index = 0
background-color = "#F5C518"
background-opacity = 0.0
active-background-opacity = 0.25
content-color = "#FFFFFF"
active-content-color = "#F5C518"
border-size = 0
icon = "keyboard.svg"
icon-size = 16

[LoginScreen.MenuArea.Power]
display = true
position = "bottom-center"
index = 0
popup-direction = "up"
popup-align = "center"
popup-width = 100
background-color = "#F5C518"
background-opacity = 0.0
active-background-opacity = 0.25
content-color = "#FFFFFF"
active-content-color = "#F5C518"
border-size = 0
icon = "power.svg"
icon-size = 16

[LoginScreen.VirtualKeyboard]
scale = 1.0
position = "login"
start-hidden = true
background-color = "#0F2240"
background-opacity = 0.95
key-content-color = "#FFFFFF"
key-color = "#F5C518"
key-opacity = 0.10
key-active-background-color = "#F5C518"
key-active-opacity = 0.25
selection-background-color = "#F5C518"
selection-content-color = "#0B1A2E"
primary-color = "#F5C518"
border-size = 0
border-color = "#F5C518"

[Tooltips]
enable = true
font-family = "RedHatDisplay"
font-size = 11
content-color = "#FFFFFF"
background-color = "#0F2240"
background-opacity = 0.95
border-radius = 8
disable-user = false
disable-login-button = false
