; Shanks - Red Hair Pirates SDDM Theme
; Elegant crimson/black/gold, Yonko-tier presence
; Haki king palette, dark and commanding

[General]
scale = 1.0
enable-animations = true
animated-background-placeholder = ""
background-fill-mode = "fill"

[LockScreen]
display = true
padding-top = 0
padding-right = 0
padding-bottom = 0
padding-left = 0
background = "shanks.png"
use-background-color = false
background-color = "#0A0A0F"
blur = 0
brightness = -0.1
saturation = 0.0

[LockScreen.Clock]
display = true
position = "center-left"
align = "center"
format = "hh:mm"
font-family = "RedHatDisplay"
font-size = 120
font-weight = 900
color = "#FFFFFF"

[LockScreen.Date]
display = true
format = "dddd, MMMM dd, yyyy"
locale = "en_US"
font-family = "RedHatDisplay"
font-size = 20
font-weight = 600
color = "#FFD700"
margin-top = -15

[LockScreen.Message]
display = false
position = "bottom-center"
align = "center"
text = "Press any key"
font-family = "RedHatDisplay"
font-size = 13
font-weight = 400
display-icon = true
icon = "enter.svg"
icon-size = 16
color = "#FFD700"
paint-icon = true
spacing = 5

[LoginScreen]
background = "shanks.png"
use-background-color = false
background-color = "#0A0A0F"
blur = 0
brightness = -0.1
saturation = 0.0

[LoginScreen.LoginArea]
position = "left"
margin = 80

[LoginScreen.LoginArea.Avatar]
shape = "circle"
border-radius = 35
active-size = 110
inactive-size = 75
inactive-opacity = 0.40
active-border-size = 3
inactive-border-size = 0
active-border-color = "#D4AF37"
inactive-border-color = "#D4AF37"

[LoginScreen.LoginArea.Username]
font-family = "RedHatDisplay"
font-size = 20
font-weight = 700
color = "#FFFFFF"
margin = 14

[LoginScreen.LoginArea.PasswordInput]
width = 150
height = 32
display-icon = false
font-family = "RedHatDisplay"
font-size = 13
icon = "password.svg"
icon-size = 16
content-color = "#FFFFFF"
background-color = "#D4AF37"
background-opacity = 0.10
border-size = 1
border-color = "#D4AF37"
border-radius-left = 12
border-radius-right = 0
margin-top = 12
masked-character = "●"

[LoginScreen.LoginArea.LoginButton]
background-color = "#D4AF37"
background-opacity = 0.90
active-background-color = "#FFD700"
active-background-opacity = 1.0
icon = "arrow-right.svg"
icon-size = 20
content-color = "#0A0A0F"
active-content-color = "#0A0A0F"
border-size = 0
border-color = "#D4AF37"
border-radius-left = 0
border-radius-right = 12
margin-left = 0
show-text-if-no-password = true
hide-if-not-needed = false
font-family = "RedHatDisplay"
font-size = 12
font-weight = 700

[LoginScreen.LoginArea.Spinner]
display-text = true
text = "Haki Activating..."
font-family = "RedHatDisplay"
font-weight = 600
font-size = 14
icon-size = 30
icon = "spinner.svg"
color = "#FFFFFF"
spacing = 8

[LoginScreen.LoginArea.WarningMessage]
font-family = "RedHatDisplay"
font-size = 11
font-weight = 400
normal-color = "#FFFFFF"
warning-color = "#FFD700"
error-color = "#FFFFFF"
margin-top = 12

[LoginScreen.MenuArea.Buttons]
margin-top = 0
margin-right = 0
margin-bottom = 0
margin-left = 50
size = 30
border-radius = 15
spacing = 14
font-family = "RedHatDisplay"

[LoginScreen.MenuArea.Popups]
max-height = 250
item-height = 32
item-spacing = 2
padding = 6
display-scrollbar = false
margin = 6
background-color = "#12121A"
background-opacity = 0.95
active-option-background-color = "#D4AF37"
active-option-background-opacity = 0.20
content-color = "#FFFFFF"
active-content-color = "#D4AF37"
font-family = "RedHatDisplay"
border-size = 1
border-color = "#D4AF37"
font-size = 12
icon-size = 16

[LoginScreen.MenuArea.Session]
display = true
position = "center-left"
index = 4
popup-direction = "right"
popup-align = "start"
display-session-name = false
button-width = -1
popup-width = 200
background-color = "#D4AF37"
background-opacity = 0.0
active-background-opacity = 1.0
content-color = "#FFFFFF"
active-content-color = "#0A0A0F"
border-size = 0
font-size = 10
icon-size = 16

[LoginScreen.MenuArea.Layout]
display = true
position = "center-left"
index = 3
popup-direction = "right"
popup-align = "start"
popup-width = 180
display-layout-name = false
background-color = "#D4AF37"
background-opacity = 0.0
active-background-opacity = 1.0
content-color = "#FFFFFF"
active-content-color = "#0A0A0F"
border-size = 0
font-size = 10
icon = "language.svg"
icon-size = 16

[LoginScreen.MenuArea.Keyboard]
display = true
position = "center-left"
index = 2
background-color = "#D4AF37"
background-opacity = 0.0
active-background-opacity = 1.0
content-color = "#FFFFFF"
active-content-color = "#0A0A0F"
border-size = 0
icon = "keyboard.svg"
icon-size = 16

[LoginScreen.MenuArea.Power]
display = true
position = "center-left"
index = 1
popup-direction = "right"
popup-align = "start"
popup-width = 100
background-color = "#D4AF37"
background-opacity = 0.0
active-background-opacity = 1.0
content-color = "#FFFFFF"
active-content-color = "#0A0A0F"
border-size = 0
icon = "power.svg"
icon-size = 16

[LoginScreen.VirtualKeyboard]
scale = 1.0
position = "login"
start-hidden = true
background-color = "#12121A"
background-opacity = 0.95
key-content-color = "#FFFFFF"
key-color = "#D4AF37"
key-opacity = 0.10
key-active-background-color = "#D4AF37"
key-active-opacity = 0.25
selection-background-color = "#D4AF37"
selection-content-color = "#0A0A0F"
primary-color = "#D4AF37"
border-size = 0
border-color = "#D4AF37"

[Tooltips]
enable = true
font-family = "RedHatDisplay"
font-size = 11
content-color = "#FFFFFF"
background-color = "#12121A"
background-opacity = 0.95
border-radius = 8
disable-user = false
disable-login-button = false
