; Thousand Sunny - Modern Minimal SDDM Theme
; Bright sunny yellow, ocean blue, cheerful ship vibes
; Franky's masterpiece, Straw Hat flagship

[General]
scale = 1.0
enable-animations = true
animated-background-placeholder = "sunny.png"
background-fill-mode = "fill"

[LockScreen]
display = true
padding-top = 0
padding-right = 0
padding-bottom = 0
padding-left = 0
background = "sunny.mp4"
use-background-color = false
background-color = "#0B2E4A"
blur = 0
brightness = -0.05
saturation = 0.0

[LockScreen.Clock]
display = true
position = "top-center"
align = "center"
format = "hh:mm"
font-family = "RedHatDisplay"
font-size = 90
font-weight = 900
color = "#FFD93D"

[LockScreen.Date]
display = true
format = "dddd, MMMM dd, yyyy"
locale = "en_US"
font-family = "RedHatDisplay"
font-size = 16
font-weight = 600
color = "#87CEEB"
margin-top = -15

[LockScreen.Message]
display = true
position = "bottom-center"
align = "center"
text = "Ahoy!  Press any key"
font-family = "RedHatDisplay"
font-size = 13
font-weight = 400
display-icon = true
icon = "enter.svg"
icon-size = 16
color = "#FFD93D"
paint-icon = true
spacing = 5

[LoginScreen]
background = "sunny.mp4"
use-background-color = false
background-color = "#0B2E4A"
blur = 0
brightness = -0.05
saturation = 0.0

[LoginScreen.LoginArea]
position = "center"
margin = -1

[LoginScreen.LoginArea.Avatar]
shape = "circle"
border-radius = 35
active-size = 120
inactive-size = 80
inactive-opacity = 0.35
active-border-size = 3
inactive-border-size = 0
active-border-color = "#FFD93D"
inactive-border-color = "#FFD93D"

[LoginScreen.LoginArea.Username]
font-family = "RedHatDisplay"
font-size = 18
font-weight = 700
color = "#FFFFFF"
margin = 12

[LoginScreen.LoginArea.PasswordInput]
width = 220
height = 34
display-icon = false
font-family = "RedHatDisplay"
font-size = 13
icon = "password.svg"
icon-size = 16
content-color = "#0B2E4A"
background-color = "#FFD93D"
background-opacity = 0.85
border-size = 0
border-color = "#FFD93D"
border-radius-left = 12
border-radius-right = 12
margin-top = 12
masked-character = "●"

[LoginScreen.LoginArea.LoginButton]
background-color = "#FFD93D"
background-opacity = 1.0
active-background-color = "#FFC107"
active-background-opacity = 1.0
icon = "arrow-right.svg"
icon-size = 20
content-color = "#0B2E4A"
active-content-color = "#0B2E4A"
border-size = 0
border-color = "#FFD93D"
border-radius-left = 12
border-radius-right = 12
margin-left = 6
show-text-if-no-password = true
hide-if-not-needed = false
font-family = "RedHatDisplay"
font-size = 12
font-weight = 700

[LoginScreen.LoginArea.Spinner]
display-text = true
text = "Preparing Coup de Burst..."
font-family = "RedHatDisplay"
font-weight = 600
font-size = 14
icon-size = 30
icon = "spinner.svg"
color = "#FFD93D"
spacing = 8

[LoginScreen.LoginArea.WarningMessage]
font-family = "RedHatDisplay"
font-size = 11
font-weight = 400
normal-color = "#87CEEB"
warning-color = "#FF8C00"
error-color = "#FF4444"
margin-top = 12

[LoginScreen.MenuArea.Buttons]
margin-top = 0
margin-right = 0
margin-bottom = 80
margin-left = 0
size = 32
border-radius = 16
spacing = 16
font-family = "RedHatDisplay"

[LoginScreen.MenuArea.Popups]
max-height = 250
item-height = 32
item-spacing = 2
padding = 6
display-scrollbar = false
margin = 6
background-color = "#0D3A5C"
background-opacity = 0.95
active-option-background-color = "#FFD93D"
active-option-background-opacity = 0.25
content-color = "#FFFFFF"
active-content-color = "#FFD93D"
font-family = "RedHatDisplay"
border-size = 1
border-color = "#FFD93D"
font-size = 12
icon-size = 16

[LoginScreen.MenuArea.Session]
display = true
position = "bottom-center"
index = 0
popup-direction = "up"
popup-align = "center"
display-session-name = false
button-width = -1
popup-width = 200
background-color = "#FFD93D"
background-opacity = 0.0
active-background-opacity = 0.25
content-color = "#FFFFFF"
active-content-color = "#FFD93D"
border-size = 0
font-size = 10
icon-size = 16

[LoginScreen.MenuArea.Layout]
display = true
position = "bottom-center"
index = 0
popup-direction = "up"
popup-align = "center"
popup-width = 180
display-layout-name = false
background-color = "#FFD93D"
background-opacity = 0.0
active-background-opacity = 0.25
content-color = "#FFFFFF"
active-content-color = "#FFD93D"
border-size = 0
font-size = 10
icon = "language.svg"
icon-size = 16

[LoginScreen.MenuArea.Keyboard]
display = true
position = "bottom-center"
index = 0
background-color = "#FFD93D"
background-opacity = 0.0
active-background-opacity = 0.25
content-color = "#FFFFFF"
active-content-color = "#FFD93D"
border-size = 0
icon = "keyboard.svg"
icon-size = 16

[LoginScreen.MenuArea.Power]
display = true
position = "bottom-center"
index = 0
popup-direction = "up"
popup-align = "center"
popup-width = 100
background-color = "#FFD93D"
background-opacity = 0.0
active-background-opacity = 0.25
content-color = "#FFFFFF"
active-content-color = "#FFD93D"
border-size = 0
icon = "power.svg"
icon-size = 16

[LoginScreen.VirtualKeyboard]
scale = 1.0
position = "login"
start-hidden = true
background-color = "#0D3A5C"
background-opacity = 0.95
key-content-color = "#FFFFFF"
key-color = "#FFD93D"
key-opacity = 0.15
key-active-background-color = "#FFD93D"
key-active-opacity = 0.30
selection-background-color = "#FFD93D"
selection-content-color = "#0B2E4A"
primary-color = "#FFD93D"
border-size = 0
border-color = "#FFD93D"

[Tooltips]
enable = true
font-family = "RedHatDisplay"
font-size = 11
content-color = "#FFFFFF"
background-color = "#0D3A5C"
background-opacity = 0.95
border-radius = 8
disable-user = false
disable-login-button = false
